name: Build & Release PokeEdit NRO

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/smapifan/devkita64-pkmswitch:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Baue NRO via Makefile
        run: |
          make clean
          make

      - name: Prüfe, ob NRO existiert und bundle sie
        run: |
          if [ ! -f PokeEdit.nro ]; then
            echo "FEHLER: PokeEdit.nro wurde nicht gebaut!"
            exit 1
          fi
          mkdir -p Release
          cp PokeEdit.nro Release/
          cp -r assets Release/ || true
          cp -r i18n Release/ || true
          cp config.json Release/ || true
          cd Release
          zip -r PokeEdit_bundle.zip ./*
          ls -lh PokeEdit_bundle.zip

      - name: Upload Release-Bundle
        uses: actions/upload-artifact@v4
        with:
          name: PokeEdit-bundle
          path: Release/PokeEdit_bundle.zip
          if-no-files-found: error
