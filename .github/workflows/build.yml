name: Build PokeEdit Bundle

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: ghcr.io/smapifan/devkita64-pkmswitch:latest  # <<-- DEIN bewährtes devkitPro-Image!
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build main PokeEdit NRO + Bundle
        run: |
          make clean
          make

      - name: Collect outputs
        run: |
          mkdir -p Release
          [ -f build/PokeEdit.nro ] && cp build/PokeEdit.nro Release/ || { echo "Main NRO fehlt"; exit 1; }
          cp -r assets Release/
          cp -r i18n Release/
          cp config.json Release/

      - name: Zip bundle
        run: |
          cd Release
          zip PokeEdit_bundle.zip *
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokeEdit-bundle
          path: Release/PokeEdit_bundle.zip
          if-no-files-found: error
