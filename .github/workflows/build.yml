name: Build PokeEdit.nro

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/devkitpro/devkita64:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl git python3

      - name: Download GUI extensions (ImGui, stb_image, json)
        run: |
          git clone --depth=1 https://github.com/ocornut/imgui include/imgui
          mkdir -p lib
          curl -L -o lib/stb_image.h https://raw.githubusercontent.com/nothings/stb/master/stb_image.h
          mkdir -p nlohmann
          curl -L -o nlohmann/json.hpp https://raw.githubusercontent.com/nlohmann/json/develop/single_include/nlohmann/json.hpp

      - name: Build project
        run: make all
