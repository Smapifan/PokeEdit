name: Build PokeEdit.nro

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: dcarrigg/switch-dev:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl git python3
      - name: Build
        run: |
          make all
