name: Probe-Build NRO (Debug only)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/smapifan/devkita64-pkmswitch:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zeige Quell-Baum
        run: |
          echo "==== Repo-Baum ===="
          find . | sort
          echo "==== Inhalt von source/ ===="
          ls -lh source/ || echo "source fehlt oder leer!"
          echo "==== Inhalt von src/ ===="
          ls -lh src/ || echo "src fehlt oder leer!"

      - name: Baue NRO (ohne weitere Schritte)
        run: |
          make clean
          make

      - name: Zeige build/-Inhalt (Debug)
        run: |
          echo "==== Inhalt von build/ ===="
          ls -lh build/ || echo "build/ fehlt!"
          echo "==== Finde alle .nro ===="
          find . -name "*.nro" || echo "Keine .nro gefunden!"
