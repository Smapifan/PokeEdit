name: Build & Upload PokeEdit.nro

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/smapifan/devkita64-pkmswitch:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build NRO
        run: |
          make clean
          make

      - name: Debug Zeige Build-Verzeichnis
        run: |
          ls -lh build/ || echo "build/ fehlt!"
          find . -name "*.nro"

      - name: Upload PokeEdit.nro aus build/
        uses: actions/upload-artifact@v4
        with:
          name: PokeEdit.nro
          path: build/PokeEdit.nro
          if-no-files-found: error
