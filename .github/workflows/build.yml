name: Build PokeEdit.nro (Switch Homebrew)

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      # ERSETZE durch deinen eigenen DockerHub- oder ghcr.io-Container
      image: meinuser/devkitpro-switch:latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install dependencies (curl, git, python3)
        run: |
          apt-get update
          apt-get install -y curl git python3

      - name: Fetch GUI/includes (ImGui, stb_image, nlohmann/json)
        run: |
          git clone --depth=1 https://github.com/ocornut/imgui include/imgui
          mkdir -p lib
          curl -L -o lib/stb_image.h https://raw.githubusercontent.com/nothings/stb/master/stb_image.h
          mkdir -p nlohmann
          curl -L -o nlohmann/json.hpp https://raw.githubusercontent.com/nlohmann/json/develop/single_include/nlohmann/json.hpp

      - name: Build NRO
        run: |
          make all

      - name: Upload Resulting NRO
        uses: actions/upload-artifact@v4
        with:
          name: PokeEdit.nro
          path: PokeEdit.nro
