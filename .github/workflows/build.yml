name: Build PokeEdit.nro

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/smapifan/devkita64-pkmswitch:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build NRO in build/
        run: |
          make clean
          make

      - name: Debug: Zeige NRO-Datei
        run: |
          ls -lh build/ || echo "build/ fehlt!"
          ls -lh build/PokeEdit.nro || echo "PokeEdit.nro fehlt!"
