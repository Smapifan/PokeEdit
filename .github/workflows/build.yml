name: Build & Upload PokeEdit.nro (mit devkitPro/ci-action)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/smapifan/devkita64-pkmswitch:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Suche Toolchain-Dateien
        run: |
          echo "Alle g++-Binaries:"
          find / -name 'aarch64-none-elf-g++' 2>/dev/null
          echo "Alle devkitpro-Verzeichnisse:"
          find / -name 'devkitpro' 2>/dev/null
          echo "PATH:"
          echo $PATH

      - name: Check Toolchain
        run: |
          which aarch64-none-elf-g++
          aarch64-none-elf-g++ --version
          echo $DEVKITPRO

      - name: Build NRO mit Log
        run: |
          make clean
          make V=1
          ls -lh build/
          find . -name "*.nro"

      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: PokeEdit.nro
          path: build/PokeEdit.nro
          if-no-files-found: error
