name: Build & Upload PokeEdit.nro (mit devkitPro/ci-action)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install devkitPro toolchain (switch)
        uses: devkitPro/ci-action@v1
        with:
          dkptype: 'switch'
      
      - name: Build NRO mit ausführlichem Log
        run: |
          make clean
          make V=1
          ls -lh build/
          find . -name "*.nro"

      - name: Upload PokeEdit.nro als Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokeEdit.nro
          path: build/PokeEdit.nro
          if-no-files-found: error
