name: Build PokeEdit.nro bundle

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install devkitPro toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl python3 wget
          wget https://apt.devkitpro.org/install-devkitpro-pacman
          chmod +x install-devkitpro-pacman
          sudo ./install-devkitpro-pacman -y
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm devkitA64 libnx switch-tools

      - name: Set environment variables
        run: |
          echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
          echo "DEVKITA64=/opt/devkitpro/devkitA64" >> $GITHUB_ENV
          echo "/opt/devkitpro/devkitA64/bin" >> $GITHUB_PATH

      - name: Build project, fetches all includes/libs
        run: |
          make clean
          make all

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: PokeEdit-release
          path: Release/
