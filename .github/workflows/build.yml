name: Build & Upload PokeEdit.nro (devkitPro Setup Script)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installiere devkitPro Toolchain
        run: |
          wget https://apt.devkitpro.org/install-devkitpro.sh
          chmod +x install-devkitpro.sh
          sudo ./install-devkitpro.sh
          echo "==== Toolchain installiert ===="
          devkitA64 --version || echo "devkitA64 nicht installiert"
          which aarch64-none-elf-g++ || echo "Compiler fehlt"
          aarch64-none-elf-g++ --version || echo "Compiler-Version nicht abrufbar"

      - name: Build NRO mit ausführlichem Log
        run: |
          make clean
          make V=1 || { echo 'MAKE FEHLER'; exit 1; }
          ls -lh build/ || echo "build/ fehlt"
          find . -name "*.nro"

      - name: Upload PokeEdit.nro als Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokeEdit.nro
          path: build/PokeEdit.nro
          if-no-files-found: error
